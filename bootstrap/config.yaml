model:
  provider: gemini
  default: gemini-2.5-flash
  base_url: https://generativelanguage.googleapis.com/v1beta

tts:
  provider: edge
  edge:
    voice: pt-BR-ThalitaMultilingualNeural

# Auxiliary tasks: keep on `auto` so Hermes uses the main model/provider.
auxiliary:
  vision:
    provider: auto
  web_extract:
    provider: auto
  title_generation:
    provider: auto
  approval:
    provider: auto
  compression:
    provider: auto
  skills_hub:
    provider: auto
  mcp:
    provider: auto
  triage_specifier:
    provider: auto

memory:
  provider: byterover

stt:
  enabled: true
  provider: local
  local:
    model: base
