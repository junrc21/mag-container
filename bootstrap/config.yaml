model:
  provider: gemini
  default: gemini-2.5-flash
  base_url: https://generativelanguage.googleapis.com/v1beta

tts:
  provider: edge
  edge:
    voice: pt-BR-ThalitaMultilingualNeural

# Auxiliary tasks: force `main` so Hermes always uses the main model/provider
# (avoids auto-detection chains that may try OpenRouter/Nous first).
auxiliary:
  vision:
    provider: main
  web_extract:
    provider: main
  title_generation:
    provider: main
  approval:
    provider: main
  compression:
    provider: main
  skills_hub:
    provider: main
  mcp:
    provider: main
  triage_specifier:
    provider: main

memory:
  provider: byterover

# Anti-noise: the end user must NEVER see engineering output on a channel
# (tool calls, status, terminal, reasoning, heartbeats, token streaming). The
# global display.<key> beats every platform's tier default, so this covers all
# channels (Telegram/WhatsApp/Slack/…). The MAG control plane emits the same
# block per-tenant in the generated config.yaml; this is the image default.
display:
  show_reasoning: false
  tool_progress: "off"
  tool_preview_length: 0
  interim_assistant_messages: false
  long_running_notifications: false
  busy_ack_detail: false
  cleanup_progress: true

streaming:
  enabled: false

# Web search/extract via ddgs (DuckDuckGo) — keyless, no browser/Chrome needed.
web:
  backend: ddgs

stt:
  enabled: true
  provider: local
  local:
    model: base
