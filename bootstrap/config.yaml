    provider: gemini
    model: gemini-2.5-flash
  compression:
    provider: gemini
    model: gemini-2.5-flash
  skills_hub:
    provider: gemini
    model: gemini-2.5-flash
  mcp:
    provider: gemini
    model: gemini-2.5-flash
  triage_specifier:
    provider: gemini
    model: gemini-2.5-flash

