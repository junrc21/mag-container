model:
  provider: gemini
  default: gemini-2.5-flash
  base_url: https://generativelanguage.googleapis.com/v1beta

tts:
  provider: edge
  edge:
    voice: pt-BR-ThalitaMultilingualNeural

# Auxiliary tasks: force `main` so Hermes always uses the main model/provider
# (avoids auto-detection chains that may try OpenRouter/Nous first).
auxiliary:
  vision:
    provider: main
  web_extract:
    provider: main
  title_generation:
    provider: main
  approval:
    provider: main
  compression:
    provider: main
  skills_hub:
    provider: main
  mcp:
    provider: main
  triage_specifier:
    provider: main

memory:
  provider: byterover

stt:
  enabled: true
  provider: local
  local:
    model: base
