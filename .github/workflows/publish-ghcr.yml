name: Publish Docker image (GHCR)

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: mag-container
  REGISTRY: ghcr.io
  # Hermes base PINADO no DIGEST do último build de prod verde (CI 27793975658, 2026-06-18).
  # NÃO usar `:main` (móvel): já avançou e o refactor do cron scheduler quebra
  # patch_cron_job_runs/patch_sanitize_cron_errors; tags antigas (v2026.6.5) são velhas
  # demais p/ patch_whatsapp_boot_deps. Este digest é o único onde TODOS os patches aplicam
  # (é o Hermes que prod já roda). Bump = trocar o digest + revalidar (build fail-loud avisa).
  BASE_IMAGE: nousresearch/hermes-agent@sha256:20c40d8c948254e1167827289b09300a476bae2eddc23a9d4a24bfde4567408e

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
